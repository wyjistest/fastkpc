name: fastkpc CPU

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cpu:
    runs-on: ubuntu-latest
    env:
      FASTKPC_RUN_CUDA_TESTS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("Rcpp", "mgcv", "energy", "RSpectra", "kernlab", "pcalg", "graph"), repos = "https://cloud.r-project.org")'
      - name: Parse R files
        run: |
          Rscript -e 'for (f in list.files("fastkpc/R", "\\\\.R$", full.names = TRUE)) { cat("parse", f, "\\n"); parse(f) }'
      - name: Run Gate B tests
        run: fastkpc/tools/run_mgcv_gate_b_tests.sh
      - name: Run Gate B mini campaign
        run: fastkpc/tools/run_mgcv_gate_b_campaign.sh fastkpc/artifacts/mgcv_gate_b
      - name: Run hybrid compatibility campaign
        run: fastkpc/tools/run_hybrid_compatibility_campaign.sh fastkpc/artifacts/hybrid_compatibility
      - name: Run hybrid calibration campaign
        run: fastkpc/tools/run_hybrid_calibration_campaign.sh fastkpc/artifacts/hybrid_calibration
      - name: Run precision ladder attribution campaign
        run: fastkpc/tools/run_precision_ladder_attribution_campaign.sh fastkpc/artifacts/precision_ladder
      - name: Check artifact summaries
        run: |
          test -f fastkpc/artifacts/mgcv_gate_b/mgcv_gate_b_fixed_sp_campaign.csv
          test -f fastkpc/artifacts/hybrid_compatibility/hybrid_near_alpha_diagnostics.csv
          test -f fastkpc/artifacts/hybrid_calibration/hybrid_calibration_summary.csv
          test -f fastkpc/artifacts/precision_ladder/precision_ladder_attribution_summary.csv
      - uses: actions/upload-artifact@v4
        with:
          name: fastkpc-cpu-campaign-artifacts
          path: |
            fastkpc/artifacts/mgcv_gate_b/mgcv_gate_b_fixed_sp_campaign.csv
            fastkpc/artifacts/hybrid_compatibility/*.csv
            fastkpc/artifacts/hybrid_calibration/hybrid_calibration_summary.csv
            fastkpc/artifacts/hybrid_calibration/hybrid_policy_summary.txt
            fastkpc/artifacts/precision_ladder/*.csv
